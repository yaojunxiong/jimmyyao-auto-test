name: Auto Test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  repository_dispatch:
    types: [run-auto-test]
  schedule:
    - cron: '0 23 * * *'

env:
  TZ: Asia/Tokyo
  BASE_URL: ${{ secrets.BASE_URL || 'https://study.jimmyyao.com' }}

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Run smoke tests
        run: npx playwright test --grep '@smoke' --reporter json:test-results/smoke.json,html,list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  regression-test:
    name: Regression test
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Check auth env
        run: |
          echo "ADMIN_EMAIL configured: ${{ secrets.ADMIN_EMAIL != '' }}"
          echo "ADMIN_PASSWORD configured: ${{ secrets.ADMIN_PASSWORD != '' }}"
          echo "TEST_USER_EMAIL configured: ${{ secrets.TEST_USER_EMAIL != '' }}"
          echo "TEST_USER_PASSWORD configured: ${{ secrets.TEST_USER_PASSWORD != '' }}"

      - name: Run study tests (unauthenticated)
        run: npx playwright test --grep '@study' --reporter json:test-results/study.json,html,list

      - name: Run authenticated admin tests (@admin-auth)
        run: npx playwright test --grep '@admin-auth' --reporter json:test-results/admin-auth.json,html,list
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run normal user e2e tests (@normal-user-e2e)
        run: npx playwright test --grep '@normal-user-e2e' --reporter json:test-results/normal-user-e2e.json,html,list
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results + screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate regression report
        if: always()
        shell: bash
        run: |
          set +e
          COMMIT_ID=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")

          append_module() {
            local label="$1"
            local json_file="$2"
            if [ ! -f "$json_file" ]; then
              echo "  - **${label}**: ⚠️ 未运行" >> report.md
              return
            fi
            local total=$(jq '.stats?.expected // 0' "$json_file" 2>/dev/null || echo 0)
            local passed=$(jq '.stats?.passed // 0' "$json_file" 2>/dev/null || echo 0)
            local failed=$(jq '.stats?.failed // 0' "$json_file" 2>/dev/null || echo 0)
            local skipped=$(jq '.stats?.skipped // 0' "$json_file" 2>/dev/null || echo 0)
            if [ "$failed" -gt 0 ] 2>/dev/null; then
              echo "  - **${label}**: ❌ FAILED (pass=${passed}, fail=${failed}, skip=${skipped})" >> report.md
              jq -r '.suites[]?.specs[]? | select(.ok == false) | "    - ❌ \`\(.title)\`"' "$json_file" 2>/dev/null >> report.md
            elif [ "$passed" -eq 0 ] && [ "$total" -gt 0 ] 2>/dev/null; then
              echo "  - **${label}**: ⚠️ NO PASSED (total=${total}, skip=${skipped})" >> report.md
            else
              echo "  - **${label}**: ✅ PASSED (total=${total}, pass=${passed}, skip=${skipped})" >> report.md
            fi
          }

          cat > report.md << REPORTEOF
          # Production Regression Report

          **Trigger**: ${{ github.event_name }}
          **Commit**: \`${COMMIT_ID}\`
          **Base URL**: ${BASE_URL}
          **Timestamp**: $(date -u '+%Y-%m-%d %H:%M UTC')

          ## Smoke Test
          REPORTEOF
          append_module "Homepage / site availability" "test-results/smoke.json"

          cat >> report.md << REPORTEOF

          ## Regression Tests
          REPORTEOF
          append_module "Unauthenticated admin pages (@study)" "test-results/study.json"
          append_module "Admin authenticated (@admin-auth)" "test-results/admin-auth.json"
          append_module "Normal user e2e (@normal-user-e2e)" "test-results/normal-user-e2e.json"

          cat >> report.md << REPORTEOF

          ## All Test Details
          REPORTEOF
          for json_file in test-results/smoke.json test-results/study.json test-results/admin-auth.json test-results/normal-user-e2e.json; do
            if [ -f "$json_file" ]; then
              group=$(basename "$json_file" .json)
              echo "" >> report.md
              echo "### ${group}" >> report.md
              echo '```' >> report.md
              jq -r '.suites[]?.specs[]? | "\(if .ok then "PASS" else "FAIL" end) \(.title)"' "$json_file" 2>/dev/null >> report.md
              echo '```' >> report.md
            fi
          done

          cat >> report.md << REPORTEOF

          ---
          _Report generated by GitHub Actions run \`${{ github.run_id }}\`_
          REPORTEOF

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report
          path: report.md
          if-no-files-found: ignore
          retention-days: 30
