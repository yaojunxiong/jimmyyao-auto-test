name: Auto Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

env:
  TZ: Asia/Tokyo

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Run smoke tests
        run: npx playwright test --grep '@smoke'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  regression-test:
    name: Regression test
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Check auth env
        run: |
          echo "ADMIN_EMAIL configured: ${{ secrets.ADMIN_EMAIL != '' }}"
          echo "ADMIN_PASSWORD configured: ${{ secrets.ADMIN_PASSWORD != '' }}"

      - name: Run unauthenticated admin tests (@study)
        run: npx playwright test --grep '@study'

      - name: Run authenticated admin tests (@admin-auth)
        run: npx playwright test --grep '@admin-auth'
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results + screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
