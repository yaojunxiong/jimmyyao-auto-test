name: Auto Test

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  repository_dispatch:
    types: [run-auto-test]
  schedule:
    - cron: '0 23 * * *'

env:
  TZ: Asia/Tokyo
  BASE_URL: ${{ secrets.BASE_URL || 'https://study.jimmyyao.com' }}

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Run smoke tests
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pw-artifacts
          npx playwright test --grep '@smoke' --reporter json,html,list 2>&1 | tee /tmp/pw-artifacts/smoke-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}
          python3 -c "
          import re, json
          with open('/tmp/pw-artifacts/smoke-raw.txt') as f:
              content = f.read()
          match = re.search(r'(\{.*\})', content, re.DOTALL)
          if match:
              with open('/tmp/pw-artifacts/smoke.json', 'w') as out:
                  out.write(match.group(1))
          "
          exit $EXIT_CODE

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload smoke JSON report
        if: always()
        run: mkdir -p smoke-json && cp /tmp/pw-artifacts/smoke.json smoke-json/ 2>/dev/null || true

      - name: Upload smoke JSON artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-json
          path: smoke-json/
          if-no-files-found: ignore
          retention-days: 1

  regression-test:
    name: Regression test
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Check auth env
        run: |
          echo "ADMIN_EMAIL configured: ${{ secrets.ADMIN_EMAIL != '' }}"
          echo "ADMIN_PASSWORD configured: ${{ secrets.ADMIN_PASSWORD != '' }}"
          echo "TEST_USER_EMAIL configured: ${{ secrets.TEST_USER_EMAIL != '' }}"
          echo "TEST_USER_PASSWORD configured: ${{ secrets.TEST_USER_PASSWORD != '' }}"

      - name: Run study tests (unauthenticated)
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pw-artifacts
          npx playwright test --grep '@study' --reporter json,html,list 2>&1 | tee /tmp/pw-artifacts/study-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}
          python3 -c "
          import re, json
          with open('/tmp/pw-artifacts/study-raw.txt') as f:
              content = f.read()
          match = re.search(r'(\{.*\})', content, re.DOTALL)
          if match:
              with open('/tmp/pw-artifacts/study.json', 'w') as out:
                  out.write(match.group(1))
          "
          exit $EXIT_CODE

      - name: Run authenticated admin tests (@admin-auth)
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pw-artifacts
          npx playwright test --grep '@admin-auth' --reporter json,html,list 2>&1 | tee /tmp/pw-artifacts/admin-auth-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}
          python3 -c "
          import re, json
          with open('/tmp/pw-artifacts/admin-auth-raw.txt') as f:
              content = f.read()
          match = re.search(r'(\{.*\})', content, re.DOTALL)
          if match:
              with open('/tmp/pw-artifacts/admin-auth.json', 'w') as out:
                  out.write(match.group(1))
          "
          exit $EXIT_CODE
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run normal user e2e tests (@normal-user-e2e)
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pw-artifacts
          npx playwright test --grep '@normal-user-e2e' --reporter json,html,list 2>&1 | tee /tmp/pw-artifacts/normal-user-e2e-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}
          python3 -c "
          import re, json
          with open('/tmp/pw-artifacts/normal-user-e2e-raw.txt') as f:
              content = f.read()
          match = re.search(r'(\{.*\})', content, re.DOTALL)
          if match:
              with open('/tmp/pw-artifacts/normal-user-e2e.json', 'w') as out:
                  out.write(match.group(1))
          "
          exit $EXIT_CODE
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run P0 core business tests (@p0)
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/pw-artifacts
          npx playwright test --grep '@p0' --reporter json,html,list 2>&1 | tee /tmp/pw-artifacts/p0-raw.txt
          EXIT_CODE=${PIPESTATUS[0]}
          python3 -c "
          import re, json
          with open('/tmp/pw-artifacts/p0-raw.txt') as f:
              content = f.read()
          match = re.search(r'(\{.*\})', content, re.DOTALL)
          if match:
              with open('/tmp/pw-artifacts/p0.json', 'w') as out:
                  out.write(match.group(1))
          "
          exit $EXIT_CODE
        env:
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload regression test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Download smoke JSON report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: smoke-json
          path: /tmp/pw-artifacts/

      - name: Copy pw JSON files to workspace
        if: always()
        run: mkdir -p pw-artifacts && cp /tmp/pw-artifacts/*.json pw-artifacts/ 2>/dev/null || true

      - name: Upload pw JSON artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pw-json
          path: pw-artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate regression report
        if: always()
        shell: bash
        run: |
          set +e
          echo "=== Diagnostic: available JSON files ==="
          for d in pw-artifacts /tmp/pw-artifacts; do
            echo "--- ${d} ---"
            if [ -d "$d" ]; then
              ls -la "$d"/*.json 2>/dev/null || echo "  (no json files)"
            else
              echo "  (directory not found)"
            fi
          done

          # Determine which directory has the JSON files
          JSON_DIR="pw-artifacts"
          if [ ! -d "$JSON_DIR" ] || ! ls "$JSON_DIR"/*.json >/dev/null 2>&1; then
            JSON_DIR="/tmp/pw-artifacts"
          fi
          echo "JSON_DIR=${JSON_DIR}"

          COMMIT_ID=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          ADMIN_CONFIGURED=${{ secrets.ADMIN_EMAIL != '' && secrets.ADMIN_PASSWORD != '' }}
          USER_CONFIGURED=${{ secrets.TEST_USER_EMAIL != '' && secrets.TEST_USER_PASSWORD != '' }}

          cat > report.md << REPORTEOF
          # Production Regression Report

          **Trigger**: ${{ github.event_name }}
          **Commit**: \`${COMMIT_ID}\`
          **Base URL**: ${BASE_URL}
          **Timestamp**: $(date -u '+%Y-%m-%d %H:%M UTC')
          REPORTEOF

          parse_json() {
            local json_file="$1"
            if [ ! -f "$json_file" ]; then
              echo ""
              return
            fi
            python3 -c "
            import json, sys
            with open('${json_file}') as f:
                data = json.load(f)
            stats = data.get('stats', {})
            total = stats.get('expected', 0) + stats.get('unexpected', 0) + stats.get('skipped', 0)
            passed = stats.get('expected', 0)
            failed = stats.get('unexpected', 0)
            skipped = stats.get('skipped', 0)
            flaky = stats.get('flaky', 0)
            print(f'{total}|{passed}|{failed}|{skipped}|{flaky}')

            def walk(suites):
                for suite in suites:
                    for spec in suite.get('specs', []):
                        yield spec
                    yield from walk(suite.get('suites', []))
            for spec in walk(data.get('suites', [])):
                ok = spec.get('ok', True)
                if not ok:
                    title = spec.get('title', '?')
                    tests = spec.get('tests', [])
                    if tests:
                        errs = tests[0].get('errors', [])
                    else:
                        errs = []
                    msg = ''
                    if errs:
                        msg = (errs[0].get('message', '') or errs[0].get('snippet', '') or '').replace(chr(10), ' ')[:200]
                    print(f'FAIL|{title}|{msg}')
                else:
                    tests = spec.get('tests', [])
                    is_skipped = any(t.get('status') in ('skipped', 'did not run') for t in tests) if tests else False
                    if is_skipped:
                        title = spec.get('title', '?')
                        print(f'SKIP|{title}|')
            " 2>/dev/null
          }

          append_module() {
            local label="$1"
            local json_file="$2"
            local missing_secret_msg="$3"
            local result
            result=$(parse_json "$json_file")
            if [ -z "$result" ]; then
              if [ -n "$missing_secret_msg" ]; then
                echo "  - **${label}**: ⏭️ ${missing_secret_msg}" >> report.md
              else
                echo "  - **${label}**: ⚠️ no result file (runner may have failed)" >> report.md
              fi
              return
            fi
            local stats=$(echo "$result" | head -1)
            IFS='|' read -r total passed failed skipped flaky <<< "$stats"
            if [ "$failed" -gt 0 ]; then
              echo "  - **${label}**: ❌ FAILED (pass=${passed}, fail=${failed}, skip=${skipped}, flaky=${flaky})" >> report.md
              echo "    Failed tests:" >> report.md
              echo "$result" | grep '^FAIL|' | while IFS='|' read -r _ name msg; do
                echo "    - ❌ \`${name}\`: ${msg}" >> report.md
              done
              echo "    - Artifact: \`regression-test-artifacts\` (screenshots, videos, traces)" >> report.md
            elif [ "$passed" -eq 0 ] && [ "$skipped" -gt 0 ]; then
              echo "  - **${label}**: ⏭️ ALL SKIPPED (total=${total}, skip=${skipped})" >> report.md
            else
              echo "  - **${label}**: ✅ PASSED (total=${total}, pass=${passed}, skip=${skipped})" >> report.md
            fi
          }

          echo "## Smoke Test" >> report.md
          append_module "Homepage / site availability" "${JSON_DIR}/smoke.json" ""

          echo "" >> report.md
          echo "## Regression Tests" >> report.md

          ADMIN_MSG=""
          USER_MSG=""
          if [ "$ADMIN_CONFIGURED" != "true" ]; then
            ADMIN_MSG="ADMIN_EMAIL / ADMIN_PASSWORD not configured in Secrets"
          fi
          if [ "$USER_CONFIGURED" != "true" ]; then
            USER_MSG="TEST_USER_EMAIL / TEST_USER_PASSWORD not configured in Secrets"
          fi

          append_module "Unauthenticated admin pages (@study)" "${JSON_DIR}/study.json" ""
          append_module "Admin authenticated (@admin-auth)" "${JSON_DIR}/admin-auth.json" "$ADMIN_MSG"
          append_module "Normal user e2e (@normal-user-e2e)" "${JSON_DIR}/normal-user-e2e.json" "$USER_MSG"
          append_module "P0 core business (@p0)" "${JSON_DIR}/p0.json" "$ADMIN_MSG"

          echo "" >> report.md
          echo "## All Test Details" >> report.md
          for name in smoke study admin-auth normal-user-e2e p0; do
            json_file="${JSON_DIR}/${name}.json"
            if [ -f "$json_file" ]; then
              echo "" >> report.md
              echo "### ${name}" >> report.md
              echo '```' >> report.md
              python3 -c "
              import json
              with open('${json_file}') as f:
                  data = json.load(f)
              def walk(suites):
                  for suite in suites:
                      for spec in suite.get('specs', []):
                          yield spec
                      yield from walk(suite.get('suites', []))
              for spec in walk(data.get('suites', [])):
                  ok = spec.get('ok', True)
                  tests = spec.get('tests', [])
                  is_skipped = any(t.get('status') in ('skipped', 'did not run') for t in tests) if tests else False
                  if not ok:
                      print(f'FAIL {spec.get(\"title\", \"?\")}')
                  elif is_skipped:
                      print(f'SKIP {spec.get(\"title\", \"?\")}')
                  else:
                      print(f'PASS {spec.get(\"title\", \"?\")}')
              " 2>/dev/null >> report.md
              echo '```' >> report.md
            fi
          done

          echo "" >> report.md
          echo "## Artifacts" >> report.md
          echo "- Regression report: \`regression-report\` (this file)" >> report.md
          echo "- Playwright HTML report + screenshots: \`regression-test-artifacts\`" >> report.md
          echo "- JSON reports: \`pw-json\`" >> report.md
          echo "" >> report.md
          echo "---" >> report.md
          echo "_Report generated by GitHub Actions run \`${{ github.run_id }}\`_" >> report.md

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report
          path: report.md
          if-no-files-found: ignore
          retention-days: 30
